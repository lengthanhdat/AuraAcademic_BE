# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# ─── Async Thread Pool ────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ai-worker-

# Sử dụng file cấu hình bí mật (đã được gitignore) để tránh lộ key
spring.config.import=optional:classpath:application-secrets.properties

# ─── Groq AI (Dự phòng khi Gemini hết quota) ───────────────────────────
groq.api.key=
groq.url=https://api.groq.com/openai/v1/chat/completions
groq.model=meta-llama/llama-4-scout-17b-16e-instruct

# ─── LiteLLM Proxy (AI Load Balancer & Fallback Gateway) ─────────────────────
# LiteLLM đứng giữa Spring Boot và các nhà cung cấp AI (Gemini, Groq, ...)
# Khởi chạy: cd AuraAcademic_AI && .\start.ps1 (Windows) hoặc bash start.sh (Linux)
litellm.proxy.url=http://localhost:4000
litellm.proxy.key=sk-litellm-aura-academic-2026
litellm.model.main=main-ai
litellm.model.vision=vision-ai

# ─── Rate Limiting ────────────────────────────────────────────────────────────
app.rate-limit.login.capacity=10
app.rate-limit.login.refill-minutes=1

# ─── Account Lockout ──────────────────────────────────────────────────────────
app.security.max-failed-attempts=5
app.security.lock-duration-minutes=15

# ─── 2FA Issuer ──────────────────────────────────────────────────────────────
app.totp.issuer=AuraAcademic

# ─── Email Verification / Password Reset token TTL (minutes) ─────────────────
app.auth.email-verification-ttl-minutes=10
app.auth.password-reset-ttl-minutes=60
