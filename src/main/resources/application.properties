# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/aura_academic

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.auracademic.backend=INFO

# Server Port
server.port=8088

# CORS (Allow Frontend calls)
spring.mvc.cors.allowed-origins=http://localhost:3000

# Google Gemini AI API Key
# Get your free key at: https://aistudio.google.com/app/apikey
gemini.api.key=YOUR_GEMINI_API_KEY_HERE

# File Upload Limits
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# ─── Async Thread Pool (cho @Async xử lý AI) ───────────────────────
# core-size: số thread luôn sẵn sàng
# max-size: số thread tối đa khi hàng đợi đầy
# queue-capacity: số job chờ tối đa trong hàng đợi
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=ai-worker-

